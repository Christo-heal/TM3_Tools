<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
90deg,
#310000,
#272727,
#411f00
);;

color:white;

}

.box{

width:550px;

padding:35px;

border-radius:25px;

background:
rgba(
255,
255,
255,
0.08
);

backdrop-filter:
blur(
20px
);

text-align:center;

}

input{

width:80%;
padding:14px;

margin:10px 0;

border:none;

border-radius:12px;

}

button{

margin-top: 20px;

width:50%;

padding:14px;

border:none;

border-radius:12px;

cursor:pointer;

font-weight:bold;

}

</style>

</head>

<body>

<div class="box">

<h1>TM3 Watermark Tool</h1>

<br>

<form
method="POST"
action="/login"
>

<input
name="username"
placeholder="Username"
required
>

<input
name="password"
type="password"
placeholder="Password"
required
>

<button>

Masuk

</button>

</form>

</div>

</body>
</html>
