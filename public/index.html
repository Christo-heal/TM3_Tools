<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PDF Watermark</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:
linear-gradient(
90deg,
#310000,
#272727,
#411f00
);

overflow:hidden;
color:white;

}

.container{

width:450px;
padding:40px;

border-radius:30px;

background:
rgba(
255,
255,
255,
0.06
);

backdrop-filter:
blur(20px);

border:
1px solid rgba(
255,
255,
255,
0.08
);

box-shadow:
0 0 50px rgba(
0,
0,
0,
0.5
);

text-align:center;

}

.logo{

font-size:60px;
margin-bottom:15px;

}

h1{

font-size:30px;
font-weight:600;
margin-bottom:10px;

}

.description{

font-size:14px;
opacity:0.7;
margin-bottom:30px;

}

.upload{

display:block;

padding:35px;

border-radius:20px;

border:
2px dashed rgba(
255,
255,
255,
0.25
);

cursor:pointer;

transition:.3s;

margin-bottom:25px;

}

.upload:hover{

border-color:white;

transform:
scale(1.02);

background:
rgba(150, 3, 3, 0.03);

}

input[type=file]{

display:none;

}

.fileName{

margin-top:10px;

font-size:13px;

opacity:0.8;

}

button{

width:100%;

padding:15px;

border:none;

border-radius:999px;

font-size:15px;

font-weight:600;

cursor:pointer;

background:white;

color:black;

transition:.3s;

}

button:hover{

transform:
translateY(-3px);

box-shadow:
0 10px 30px rgba(
255,
255,
255,
0.15
);

}

.footer{

margin-top:25px;

font-size:12px;

opacity:0.5;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">
📄
</div>

<h1>TM3 Watermark Tool</h1>

<div class="description">

Upload PDF dan watermark akan ditambahkan otomatis

</div>

<form
action="/watermark"
method="POST"
enctype="multipart/form-data"
>

<input
type="hidden"
name="template"
value="WatermarkTM3"
>

<label
class="upload"
for="pdf"
id="dropArea"
>

Klik atau drag PDF ke sini

<div
class="fileName"
id="fileName"
>

Belum ada file dipilih

</div>

</label>

<input
type="file"
id="pdf"
name="pdf"
accept=".pdf"
required
>

<button>

Generate PDF

</button>

</form>

<div class="footer">

Made for TM3 by GregoriusChristo

</div>

</div>

<script>

const input=
document.getElementById(
"pdf"
);

const fileName=
document.getElementById(
"fileName"
);

input.addEventListener(
"change",
()=>{

if(
input.files.length>0
){

fileName.innerHTML=
input.files[0].name;

}

}
);

</script>

</body>
</html>
